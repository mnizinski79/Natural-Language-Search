<div *ngIf="visible" class="calendar-inline">
  <div class="calendar-content">
    <!-- Header -->
    <div class="calendar-header">
      <div class="header-content">
        <h2 class="calendar-title">Select dates</h2>
      </div>
      <button class="close-button" (click)="onCancel()" aria-label="Close calendar">
        <svg class="close-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Month navigation -->
    <div class="month-navigation">
      <h3 class="current-month-label">{{ getMonthYearLabel() }}</h3>
      <div class="nav-buttons">
        <button 
          class="nav-button" 
          (click)="previousMonthView()"
          [disabled]="!canGoBack()"
          aria-label="Previous month"
        >
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <button 
          class="nav-button" 
          (click)="nextMonthView()"
          aria-label="Next month"
        >
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Calendar grid container -->
    <div class="calendar-container">
      <div class="month-section">
        <!-- Week day headers -->
        <div class="weekday-header">
          <div class="weekday" *ngFor="let day of weekDays">{{ day }}</div>
        </div>
        
        <!-- Calendar days -->
        <div class="calendar-grid">
          <div 
            *ngFor="let day of calendarDays"
            class="calendar-day"
            [class.disabled]="day.isDisabled"
            [class.not-current-month]="!day.isCurrentMonth"
            [class.selected]="day.isSelected"
            [class.in-range]="day.isInRange"
            [class.check-in]="day.isCheckIn"
            [class.check-out]="day.isCheckOut"
            (click)="onDayClick(day)"
          >
            <div class="day-number">{{ day.dayNumber }}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="calendar-footer">
      <div class="booking-summary">
        <div class="summary-row">
          <span class="summary-label">{{ getDateRangeLabel() }}</span>
          <span class="summary-nights" *ngIf="nights > 0">{{ nights }} night{{ nights !== 1 ? 's' : '' }}</span>
        </div>
      </div>
      
      <button 
        class="continue-button"
        (click)="onApply()"
        [disabled]="!selectedCheckIn || !selectedCheckOut"
      >
        APPLY DATES
      </button>
    </div>
  </div>
</div>
